name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Install bws CLI
        env:
          BWS_VERSION: '1.0.0'
        run: |
          curl -fsSL "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip" -o /tmp/bws.zip
          sudo unzip -q /tmp/bws.zip -d /usr/local/bin
          sudo chmod +x /usr/local/bin/bws

      - name: Lint + build
        run: |
          npm run lint
          npm run build

      - name: Unit + protocol tests
        run: |
          npm run test:unit
          npm run test:protocol

      - name: Integration tests
        env:
          BWS_ACCESS_TOKEN_TEST: ${{ secrets.BWS_ACCESS_TOKEN_TEST }}
          BWS_TEST_PROJECT_ID: ${{ secrets.BWS_TEST_PROJECT_ID }}
        run: npm run test:integration

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
